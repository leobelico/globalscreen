# ============================================================
#  mundial-switch.yml  —  VERSIÓN COMPLETA
#  Cambia entre versión MUNDIAL (ac2cd24) y BANNER (148e330)
#
#  Horarios México CDT (UTC-5). Partido ~2h.
#  MUNDIAL: 30 min ANTES del primer partido del día
#  BANNER:  30 min DESPUÉS del último partido del día
#
#  Fase de grupos: horarios exactos de ESPN (confirmados)
#  Eliminatorias: horarios placeholder 10:30 mx activación /
#                 23:30 mx restauración — ACTUALIZAR cuando
#                 FIFA confirme cruces y horarios.
# ============================================================

name: Mundial 2026 – Version Switch

