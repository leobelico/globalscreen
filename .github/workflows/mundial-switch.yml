    # ════════════════════════════════════════════════
    # FASE DE GRUPOS — horarios exactos
    # ════════════════════════════════════════════════

    # ── 11 JUN ── México 13:00 / Corea 20:00
    # Primer partido 13:00 → mundial 12:30 = 17:30 UTC
    # Último partido 20:00 + 2h = 22:00 → banner 22:30 = 03:30 UTC del 12
    - cron: '30 17 11 6 *'
    - cron: '30 03 12 6 *'

    # ── 12 JUN ── Canadá 13:00 / EUA 19:00
