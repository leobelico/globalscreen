    # ── 19 JUL ── FINAL
    - cron: '30 15 19 7 *'
    - cron: '30 04 20 7 *'

  workflow_dispatch:
    inputs:
      version:
        description: '¿Qué versión activar?'
        required: true
        type: choice
        options:
