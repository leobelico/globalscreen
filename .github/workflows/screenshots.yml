name: Screenshot Monitor

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  screenshots:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Crear entorno Puppeteer aislado
        run: |
          mkdir -p /tmp/puppeteer-runner
          cd /tmp/puppeteer-runner
          npm init -y
          npm install puppeteer --legacy-peer-deps

      - name: Ejecutar screenshots
        env:
          NODE_PATH: /tmp/puppeteer-runner/node_modules
        run: |
          node screenshots.js

      - uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_id }}
          path: screenshots/
          retention-days: 30